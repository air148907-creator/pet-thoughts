<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мысли питомца</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@vkontakte/vk-bridge@2.15.0/dist/browser.min.js"></script>
</head>
<body>
    <div class="app-container" id="app">
        <!-- Экран загрузки -->
        <div class="loading-screen" id="loadingScreen">
            <div class="loader"></div>
            <p>Загружаем...</p>
        </div>

        <!-- Экран создания профиля -->
        <div class="profile-screen hidden" id="profileScreen">
            <h1 class="title">🫵 Кто тут у нас?</h1>
            <div class="input-group">
                <label for="petName">Имя питомца</label>
                <input type="text" id="petName" placeholder="Например, Барсик" maxlength="20">
            </div>
            <div class="input-group">
                <label for="petType">Кто он?</label>
                <select id="petType">
                    <option value="Кот">🐱 Кот</option>
                    <option value="Кошка">🐈 Кошка</option>
                    <option value="Пёс">🐶 Пёс</option>
                    <option value="Собака">🐕 Собака</option>
                    <option value="Попугай">🦜 Попугай</option>
                    <option value="Хомяк">🐹 Хомяк</option>
                    <option value="Кролик">🐰 Кролик</option>
                    <option value="Другой">❓ Другой</option>
                </select>
            </div>
            <button class="vk-button" id="saveProfileBtn">Сохранить и продолжить</button>
        </div>

        <!-- Основной интерфейс (после создания профиля) -->
        <div class="main-interface hidden" id="mainInterface">
            <!-- Шапка с именем питомца и кнопкой смены профиля -->
            <div class="header">
                <div class="pet-info" id="petInfoDisplay"></div>
                <button class="edit-profile-btn" id="editProfileBtn" title="Сменить питомца">✏️</button>
            </div>

            <!-- Табы -->
            <div class="tabs">
                <button class="tab-btn active" id="tabThoughts">💭 Мысли</button>
                <button class="tab-btn" id="tabChat">💬 Чат с Мафией</button>
            </div>

            <!-- Контент таба "Мысли" -->
            <div class="tab-content active" id="thoughtsTab">
                <div class="thought-card">
                    <div class="thought-bubble" id="thoughtText"></div>
                </div>
                <div class="actions">
                    <button class="vk-button share-button" id="shareButton">Поделиться мыслью 📤</button>
                    <p class="update-note" id="updateNote"></p>
                </div>
            </div>

            <!-- Контент таба "Чат" -->
            <div class="tab-content" id="chatTab">
                <div class="chat-messages" id="chatMessages">
                    <!-- Сюда будут добавляться сообщения -->
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Спроси Мафию..." maxlength="200">
                    <button class="vk-button send-btn" id="sendChatBtn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
