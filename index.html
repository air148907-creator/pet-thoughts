<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мысли питомца</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем VK Bridge для работы с API ВКонтакте -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge@2.15.0/dist/browser.min.js"></script>
</head>
<body>
    <div class="app-container" id="app">
        <!-- Экран загрузки -->
        <div class="loading-screen" id="loadingScreen">
            <div class="loader"></div>
            <p>Загружаем мысли...</p>
        </div>

        <!-- Экран создания профиля (показывается, если нет данных) -->
        <div class="profile-screen hidden" id="profileScreen">
            <h1 class="title">🫵 Кто тут у нас?</h1>
            <div class="input-group">
                <label for="petName">Имя питомца</label>
                <input type="text" id="petName" placeholder="Например, Барсик" maxlength="20">
            </div>
            <div class="input-group">
                <label for="petType">Кто он?</label>
                <select id="petType">
                    <option value="Кот">🐱 Кот</option>
                    <option value="Кошка">🐈 Кошка</option>
                    <option value="Пёс">🐶 Пёс</option>
                    <option value="Собака">🐕 Собака</option>
                    <option value="Попугай">🦜 Попугай</option>
                    <option value="Хомяк">🐹 Хомяк</option>
                    <option value="Кролик">🐰 Кролик</option>
                    <option value="Другой">❓ Другой</option>
                </select>
            </div>
            <button class="vk-button" id="saveProfileBtn">Сохранить и узнать мысли</button>
            <p class="disclaimer">Каждый день — новая мысль ✨</p>
        </div>

        <!-- Главный экран с мыслью дня -->
        <div class="main-screen hidden" id="mainScreen">
            <div class="header">
                <div class="pet-info" id="petInfoDisplay">
                    <!-- Сюда подставится имя и тип -->
                </div>
                <button class="edit-profile-btn" id="editProfileBtn" title="Сменить питомца">✏️</button>
            </div>

            <div class="thought-card" id="thoughtCard">
                <div class="thought-bubble" id="thoughtText">
                    <!-- Здесь будет мысль -->
                </div>
            </div>

            <div class="actions">
                <button class="vk-button share-button" id="shareButton">
                    Поделиться мыслью 📤
                </button>
                <p class="update-note" id="updateNote"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
